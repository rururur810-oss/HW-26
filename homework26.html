<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./homeworkstyle26.css">
</head>

<body>
    <button data-modal-open>відкрити модалку</button>
    <div class="backdrop is-hidden" data-modal>
        <div class="modal">
            <h2>Заповніть свої дані</h2>
            <form class="contact-form" action="#" novalidate>
                <label class="input-group">Ім'я
                    <img src="Vector.svg" alt="user icon" class="icon">
                    <input type="text" name="name" placeholder="Введіть ім'я" required>
                </label>

                <label class="input-group">Телефон
                    <img src="Vector (1).svg" alt="phone icon" class="icon">
                    <input type="tel" name="phone" placeholder="Введіть телефон" required>
                </label>

                <label class="input-group">Пошта
                    <img src="Vector (2).svg" alt="email icon" class="icon">
                    <input type="email" name="email" placeholder="Введіть email" required>
                </label>

                <label>Коментар
                    <textarea name="comment" placeholder="Введіть текст" rows="4"></textarea>
                </label>

                <label>
                    <input type="checkbox" name="agreement" required>
                    Погоджуюся з розсилкою та приймаю <a href="#">Умови договору</a>
                </label>

                <div class="modal-actions">
                    <button type="submit">Відправити</button>
                    <button type="button" data-modal-close>Закрити</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <section class="footer-left">
            <h3>ПІДПИСУЙТЕСЯ</h3>
        </section>
        <section class="footer-right">
            <h3>ПІДПИСАТИСЯ НА РОЗИЛКУ</h3>
            <form class="subscribe-form">
                <input type="email" placeholder="E-mail" required>
                <button type="submit">Підписатися ➤</button>
            </form>
        </section>
    </footer>
    <script src="./js/modal.js"></script>
</body>

</html>
